<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillSwap</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Shared base styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">

  <!-- Per-page CSS (each page injects its own stylesheet here) -->
  {% block styles %}{% endblock %}
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar navbar-expand-lg bg-white border-bottom px-4 py-0" style="height: 60px;">

    <a class="navbar-brand d-flex align-items-center gap-2 fw-bold text-dark" href="{{ url_for('index') }}">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="#1a3a6b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      SkillSwap
    </a>

    <div class="ms-auto d-flex align-items-center gap-1">
      <a href="{{ url_for('skills') }}"
         class="nav-link px-3 py-2 rounded {% if request.endpoint == 'skills' %}active-link{% endif %}">
        Skills
      </a>
      <a href="{{ url_for('requests') }}"
         class="nav-link px-3 py-2 rounded {% if request.endpoint == 'requests' %}active-link{% endif %}">
        Requests
      </a>
      <a href="{{ url_for('chat') }}"
         class="nav-link px-3 py-2 rounded {% if request.endpoint == 'chat' %}active-link{% endif %}">
        Chat
      </a>
      <a href="{{ url_for('profile') }}"
         class="nav-link px-3 py-2 rounded {% if request.endpoint == 'profile' %}active-link{% endif %}">
        Profile
      </a>
      <a href="{{ url_for('logout') }}"
         class="nav-link px-3 py-2 rounded d-flex align-items-center gap-1 text-danger logout-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </a>
    </div>

  </nav>
  <!-- ===== END NAVBAR ===== -->

  <!-- Page content goes here -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS + jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Per-page JS -->
  {% block scripts %}{% endblock %}

</body>
</html>
