{% extends "base.html" %}

{% block nav_links %}
<a href="{{ url_for('login') }}" class="index-nav-login">Login</a>
<a href="{{ url_for('signup') }}" class="index-nav-signup">Sign Up</a>
{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-heading">
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Login to your SkillSwap account.</p>
    </div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email"
               name="email"
               class="auth-input"
               placeholder="jane@campus.edu"
               required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password"
               name="password"
               class="auth-input"
               placeholder="••••••••"
               required>
      </div>

      <button type="submit" class="auth-btn">Login</button>

    </form>

    <p class="auth-footer">
      Don't have an account?
      <a href="{{ url_for('signup') }}" class="auth-link">Sign Up</a>
    </p>

  </div>
</div>
{% endblock %}
