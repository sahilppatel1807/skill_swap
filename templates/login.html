{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-heading">
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Login to your SkillSwap account.</p>
    </div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}"
      onsubmit="document.querySelector('.auth-error') && document.querySelector('.auth-error').remove()">
      {{ form.hidden_tag() }}

      <div class="form-group">
        <label class="form-label">Email or Nickname</label>
        <input type="text"
              name="identifier"
              class="auth-input"
              maxlength="150"
              placeholder="Email or nickname"
              required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password"
               name="password"
               class="auth-input"
               maxlength="128"
               placeholder="••••••••"
               required>
      </div>

      <button type="submit" class="auth-btn">Login</button>

    </form>

    <p class="auth-footer">
      Don't have an account?
      <a href="{{ url_for('auth.signup') }}" class="auth-link">Sign Up</a>
    </p>

  </div>
</div>
{% endblock %}
