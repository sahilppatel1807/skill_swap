{% extends "base.html" %}

{% block content %}
<div class="container py-5">
  <h2>Change Nickname</h2>

  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="POST">
    {{ form.hidden_tag() }}
  <div class="mb-3">
    {{ form.nickname.label(class="form-label") }}
    {{ form.nickname(class="form-control") }}
  </div>

    <button type="submit" class="btn btn-primary">
      Update Nickname
    </button>
  </form>
</div>
{% endblock %}
