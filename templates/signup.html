{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}


{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-heading">
      <h2 class="auth-title">Create an account</h2>
      <p class="auth-subtitle">Join SkillSwap and start exchanging skills.</p >
    </div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.signup') }}">
      {{ form.hidden_tag() }}

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="auth-input"
               placeholder="Jane Doe" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">Nickname</label>
        <input type="text" name="nickname" class="auth-input"
               placeholder="jane123" required>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="auth-input"
               placeholder="jane@campus.edu" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="auth-input"
            placeholder="At least 8 characters"
            minlength="8"
            pattern="^(?=.*[A-Za-z])(?=.*\d).{8,}$"
            title="Password must be at least 8 characters and include at least one letter and one number."
            required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="auth-input"
              placeholder="Re-enter your password"
              required>
      </div>

      <div class="form-group">
        <label class="form-label">Course / Major</label>
        <input type="text" name="course" class="auth-input"
               placeholder="Computer Science">
      </div>

      <div class="form-group">
        <label class="form-label">Bio</label>
        <textarea name="bio" class="auth-input auth-textarea"
                  placeholder="Tell us about yourself and the skills you'd like to share..."></textarea>
      </div>

      <button type="submit" class="auth-btn">Sign Up</button>

    </form>

    <p class="auth-footer">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="auth-link">Login</a >
    </p >

  </div>
</div>
{% endblock %}
